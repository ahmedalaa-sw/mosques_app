name: mosques_app
description: "A new Flutter project."
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  adhan_dart: ^1.2.0
  arabic_search: ^0.2.3
  dartz: ^0.10.1
  dio: ^5.9.2
  easy_localization: ^3.0.7
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_dotenv: ^5.2.1
  flutter_localizations:
    sdk: flutter
  flutter_screenutil: ^5.9.3
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  google_nav_bar: ^5.0.7
  hive_flutter: ^1.1.0
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.3.2
  supabase_flutter: ^2.12.4
  url_launcher: ^6.3.2
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  flutter_timezone: ^4.1.0
  workmanager: ^0.9.0+3
  skeletonizer: ^2.1.3
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/translations/
    - .env

  fonts:
    - family: IBMPlexSansArabic
      fonts:
        - asset: assets/fonts/IBMPlexSansArabic-Regular.ttf
        - asset: assets/fonts/IBMPlexSansArabic-Medium.ttf
          weight: 500
        - asset: assets/fonts/IBMPlexSansArabic-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/IBMPlexSansArabic-Bold.ttf
          weight: 700
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/slogo.png"
  remove_alpha_ios: true
  background_color: "#0F1B33"
  adaptive_icon_background: "#0F1B33"
  adaptive_icon_foreground: "assets/images/slogo.png"
flutter_native_splash:
  color: "#0F1B33"
  image: assets/images/logo2.png
  android: true
  ios: true

  android_12:
    image: assets/images/logo2.png
    color: "#0F1B33"
  fullscreen: true
